services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: pentestlab
      POSTGRES_USER: pentestlab
      POSTGRES_PASSWORD: pentestlab
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    environment:
      DATABASE_URL: postgresql+psycopg://pentestlab:pentestlab@postgres:5432/pentestlab
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: change-me-in-production
      ENVIRONMENT: production
      DEBUG: "false"
    depends_on:
      - postgres
      - redis
    ports:
      - "8000:8000"

volumes:
  postgres-data:
